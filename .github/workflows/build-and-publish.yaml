name: Publish Image to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      version: v4
    steps:
      - run: echo "Config ready"

  dev-node:
    needs: config
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      context: ./base
      platforms: linux/amd64,linux/arm64
      output: image
      sign: none
      push: true
      meta-images: ghcr.io/${{ github.repository_owner }}/dev-node
      meta-tags: type=raw,value=${{ needs.config.outputs.version }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        - registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  dev-playwright:
    needs: [config, dev-node]
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      context: ./playwright
      platforms: linux/amd64,linux/arm64
      output: image
      sign: none
      push: true
      meta-images: ghcr.io/${{ github.repository_owner }}/dev-playwright
      meta-tags: type=raw,value=${{ needs.config.outputs.version }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  dev-firebase:
    needs: [config, dev-playwright]
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      context: ./firebase
      platforms: linux/amd64,linux/arm64
      output: image
      sign: none
      push: true
      meta-images: ghcr.io/${{ github.repository_owner }}/dev-firebase
      meta-tags: type=raw,value=${{ needs.config.outputs.version }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  dev-quizmaster:
    needs: [config, dev-playwright]
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      context: ./quizmaster
      platforms: linux/amd64,linux/arm64
      output: image
      sign: none
      push: true
      meta-images: ghcr.io/${{ github.repository_owner }}/dev-quizmaster
      meta-tags: type=raw,value=${{ needs.config.outputs.version }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  dev-rust:
    needs: [config, dev-node]
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      context: ./rust
      platforms: linux/amd64,linux/arm64
      output: image
      sign: none
      push: true
      meta-images: ghcr.io/${{ github.repository_owner }}/dev-rust
      meta-tags: type=raw,value=${{ needs.config.outputs.version }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
